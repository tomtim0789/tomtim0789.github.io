name: Deploy to GitHub Pages

on:
  # 每次推送到 main 分支时自动部署（你的默认分支就是 main）
  push:
    branches: [main]
  # 也允许在 GitHub 的 Actions 页面手动触发
  workflow_dispatch:

# 授予该工作流克隆仓库并发布 Pages 的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署，新推送会取消进行中的旧任务
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        # 官方 Action：自动安装依赖（按 lockfile 识别为 npm）、运行
        # astro build，并写入 .nojekyll，避免 GitHub Pages 的 Jekyll
        # 忽略掉 Astro 的 _astro/ 资源目录
        uses: withastro/action@v3
        with:
              package-manager: npm
        #   path: .            # Astro 项目根目录（默认就是仓库根目录）
        #   node-version: 20   # 构建用的 Node 版本（默认 20）
        #   package-manager: npm  # 一般无需指定，会按 lockfile 自动识别

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
